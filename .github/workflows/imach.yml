name: solar

on:
  schedule:
  
    - cron: '*/5 * * * *'
  push:
    branches:
      - main
      - master
      
    paths-ignore:
      - '*.m3u'
      - '*.m3u8'
      
  workflow_dispatch:


permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Setup Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cloudscraper

      - name: 4. Jalankan Script Pencocokan EPG
      
        run: |
          python imach.py

      - name: 5. Simpan Hasil M3U ke Repository
      
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "b-yansh"
          git add imach.pl README.md laporan_rumus.txt laporan_channel_m3u.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-up: $(TZ='Asia/Jakarta' date +'%Y-%m-%d %H:%M:%S WIB')" && git push)
